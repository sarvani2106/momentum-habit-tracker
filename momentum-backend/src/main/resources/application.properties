spring.application.name=momentum-backend
# 1. Server Configuration
server.port=8080

# 2. MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/momentum_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Hibernate (The tool that translates Java to SQL)
# 'update' means Spring will update our database if we change things, but won't delete our tables.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect